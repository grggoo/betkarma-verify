    <style>
      :root {
        color-scheme: light;
        --bg: #f4f6fb;
        --surface: #ffffff;
        --surface-2: #f8fafc;
        --fg: #0f172a;
        --muted: #5b6675;
        --faint: #8a93a3;
        --line: #e4e8ef;
        --line-strong: #d4dae3;
        --accent: #0e7a52;
        --accent-ink: #0b5f40;
        --accent-soft: #e8f6ef;
        --accent-line: #bfe6d4;
        --brand: #b8860b;
        --ok: #0e7a52;
        --bad: #c1342c;
        --shadow: 0 1px 2px rgba(15, 23, 42, 0.04), 0 8px 24px rgba(15, 23, 42, 0.06);
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial;
        background: var(--bg);
        color: var(--fg);
        line-height: 1.55;
        -webkit-font-smoothing: antialiased;
      }
      a { color: var(--accent-ink); text-decoration: none; font-weight: 600; }
      a:hover { text-decoration: underline; }
      .muted { color: var(--muted); }
      .faint { color: var(--faint); }
      code, .mono {
        font-family: ui-monospace, "Cascadia Code", Menlo, Consolas, monospace;
        font-size: 12.5px;
      }
      code {
        background: var(--surface-2);
        border: 1px solid var(--line);
        padding: 1px 6px;
        border-radius: 6px;
        color: #334155;
      }

      /* ---------- top bar ---------- */
      .topbar {
        background: var(--surface);
        border-bottom: 1px solid var(--line);
      }
      .topbar-inner {
        max-width: 1020px;
        margin: 0 auto;
        padding: 14px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
      .brand-mark {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 34px;
        height: 34px;
        border-radius: 10px;
        background: var(--accent-soft);
        border: 1px solid var(--accent-line);
        color: var(--accent);
        flex-shrink: 0;
      }
      .brand-name { font-size: 16px; font-weight: 800; letter-spacing: -0.01em; }
      .brand-tag { font-size: 12px; color: var(--muted); }
      .lang { display: inline-flex; align-items: center; gap: 8px; font-size: 13px; }
      .lang a {
        color: var(--muted);
        font-weight: 600;
        padding: 4px 10px;
        border-radius: 999px;
        border: 1px solid transparent;
      }
      .lang a.active {
        color: var(--accent-ink);
        background: var(--accent-soft);
        border-color: var(--accent-line);
      }

      /* ---------- layout ---------- */
      main { max-width: 1020px; margin: 0 auto; padding: 28px 20px 64px; }
      section { margin-top: 40px; }
      section:first-of-type { margin-top: 28px; }
      .section-title {
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
        margin: 0 0 16px;
      }

      /* ---------- hero ---------- */
      .hero {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 30px 28px;
        box-shadow: var(--shadow);
      }
      .hero .kicker {
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.24em;
        color: var(--accent);
        text-transform: uppercase;
      }
      .hero h1 {
        margin: 12px 0 10px;
        font-size: 32px;
        line-height: 1.12;
        letter-spacing: -0.02em;
        font-weight: 850;
      }
      .hero .lead {
        margin: 0;
        font-size: 16px;
        color: var(--muted);
        max-width: 720px;
      }

      /* ---------- path cards ---------- */
      .grid {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      }
      .card {
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 22px;
        background: var(--surface);
        box-shadow: var(--shadow);
        display: flex;
        flex-direction: column;
      }
      .badge {
        align-self: flex-start;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 4px 10px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent-ink);
        border: 1px solid var(--accent-line);
      }
      .card h3 { margin: 14px 0 8px; font-size: 19px; font-weight: 800; letter-spacing: -0.01em; }
      .card p { margin: 0 0 14px; color: var(--muted); font-size: 14.5px; }
      .card .where {
        font-size: 13px;
        color: var(--fg);
        background: var(--surface-2);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 12px;
        margin: 0 0 16px;
      }
      .card .spacer { flex: 1; }
      .cta {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        align-self: flex-start;
        padding: 11px 18px;
        border-radius: 11px;
        background: var(--accent);
        color: #fff;
        font-weight: 700;
        font-size: 14.5px;
        border: 1px solid var(--accent-ink);
      }
      .cta:hover { background: var(--accent-ink); text-decoration: none; }
      .cta .arrow { font-weight: 800; }

      /* ---------- signer anchor strip ---------- */
      .anchor-strip {
        margin-top: 16px;
        border: 1px solid var(--accent-line);
        background: var(--accent-soft);
        border-radius: 14px;
        padding: 16px 18px;
      }
      .anchor-strip .label {
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--accent-ink);
      }
      .anchor-strip .addr {
        margin-top: 8px;
        font-family: ui-monospace, Menlo, Consolas, monospace;
        font-size: 15px;
        font-weight: 700;
        color: var(--accent-ink);
        word-break: break-all;
      }
      .anchor-strip .file { margin-top: 6px; font-size: 13px; }

      /* ---------- steps ---------- */
      .steps {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      }
      .step {
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--surface);
        padding: 20px;
        box-shadow: var(--shadow);
      }
      .step .num {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 30px;
        height: 30px;
        border-radius: 50%;
        background: var(--accent-soft);
        border: 1px solid var(--accent-line);
        color: var(--accent-ink);
        font-weight: 800;
        font-size: 14px;
      }
      .step h4 { margin: 12px 0 6px; font-size: 16px; font-weight: 800; }
      .step p { margin: 0; color: var(--muted); font-size: 14px; }
      .note {
        margin-top: 16px;
        border-left: 3px solid var(--accent-line);
        background: var(--surface);
        border-radius: 0 12px 12px 0;
        padding: 12px 16px;
        font-size: 13.5px;
        color: var(--muted);
      }

      /* ---------- live log ---------- */
      .log-grid {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      }
      .log-card {
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 16px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }
      .log-head { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
      .log-head b { font-size: 15px; }
      .pill {
        font-size: 11px;
        font-weight: 700;
        padding: 3px 10px;
        border-radius: 999px;
        background: var(--surface-2);
        border: 1px solid var(--line);
        color: var(--muted);
      }
      .log-card .files { margin-top: 10px; font-size: 13px; }
      .log-card .stats {
        margin-top: 12px;
        font-family: ui-monospace, Menlo, Consolas, monospace;
        font-size: 12px;
        color: var(--muted);
        white-space: pre-wrap;
        word-break: break-word;
      }
      .ok { color: var(--ok); }
      .bad { color: var(--bad); }

      /* ---------- where table ---------- */
      .where-table {
        width: 100%;
        border-collapse: collapse;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 14px;
        overflow: hidden;
        box-shadow: var(--shadow);
      }
      .where-table th, .where-table td {
        text-align: left;
        padding: 13px 16px;
        font-size: 14px;
        border-bottom: 1px solid var(--line);
        vertical-align: top;
      }
      .where-table th { background: var(--surface-2); color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; }
      .where-table tr:last-child td { border-bottom: none; }
      .where-table td:first-child { font-weight: 700; white-space: nowrap; }

      /* ---------- advanced ---------- */
      details.advanced {
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--surface);
        box-shadow: var(--shadow);
        padding: 4px 22px;
      }
      details.advanced > summary {
        cursor: pointer;
        list-style: none;
        padding: 18px 0;
        font-size: 16px;
        font-weight: 800;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      details.advanced > summary::-webkit-details-marker { display: none; }
      details.advanced > summary .chev { color: var(--muted); transition: transform 150ms ease; }
      details.advanced[open] > summary .chev { transform: rotate(90deg); }
      .advanced-body { padding: 0 0 22px; }
      .advanced-body h4 { margin: 18px 0 10px; font-size: 14px; font-weight: 800; }
      ol.manual { margin: 0; padding-left: 20px; color: var(--muted); font-size: 14px; }
      ol.manual li { margin-bottom: 8px; }
      textarea {
        width: 100%;
        min-height: 110px;
        border-radius: 12px;
        border: 1px solid var(--line-strong);
        background: var(--surface-2);
        color: var(--fg);
        padding: 12px;
        font-family: ui-monospace, Menlo, Consolas, monospace;
        font-size: 12px;
        resize: vertical;
      }
      textarea:focus { outline: none; border-color: var(--accent); }
      button {
        border: 1px solid var(--accent-ink);
        background: var(--accent);
        color: #fff;
        padding: 10px 16px;
        border-radius: 10px;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        font-size: 14px;
      }
      button:hover { background: var(--accent-ink); }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
        background: var(--surface-2);
        padding: 12px;
        border-radius: 12px;
        border: 1px solid var(--line);
        font-size: 12.5px;
      }

      /* ---------- footer ---------- */
      footer {
        margin-top: 48px;
        padding-top: 22px;
        border-top: 1px solid var(--line);
        font-size: 13px;
        color: var(--muted);
        display: flex;
        flex-wrap: wrap;
        gap: 10px 18px;
        align-items: center;
        justify-content: space-between;
      }

      @media (max-width: 560px) {
        .hero { padding: 24px 20px; }
        .hero h1 { font-size: 26px; }
        main { padding: 22px 16px 52px; }
      }
    </style>
  </head>

    <script>
      (function applyI18n() {
        var T = window.__T;
        var lang = window.__lang || "en";
        if (!T) return;
        var map = {
          "i18n-brandTag": "brandTag",
          "i18n-heroKicker": "heroKicker",
          "i18n-heroTitle": "heroTitle",
          "i18n-heroLead": "heroLead",
          "i18n-whatTitle": "whatTitle",
          "i18n-pathCasinoBadge": "pathCasinoBadge",
          "i18n-pathCasinoTitle": "pathCasinoTitle",
          "i18n-pathCasinoText": "pathCasinoText",
          "i18n-pathCasinoWhere": "pathCasinoWhere",
          "i18n-pathCasinoCta": "pathCasinoCta",
          "i18n-pathLetterBadge": "pathLetterBadge",
          "i18n-pathLetterTitle": "pathLetterTitle",
          "i18n-pathLetterText": "pathLetterText",
          "i18n-pathLetterPairs": "pathLetterPairs",
          "i18n-pathLetterWhere": "pathLetterWhere",
          "i18n-pathLetterCta": "pathLetterCta",
          "i18n-signerLabel": "signerLabel",
          "i18n-howTitle": "howTitle",
          "i18n-howLead": "howLead",
          "i18n-howStep1Title": "howStep1Title",
          "i18n-howStep1Text": "howStep1Text",
          "i18n-howStep2Title": "howStep2Title",
          "i18n-howStep2Text": "howStep2Text",
          "i18n-howStep3Title": "howStep3Title",
          "i18n-howStep3Text": "howStep3Text",
          "i18n-howWhy": "howWhy",
          "i18n-logTitle": "logTitle",
          "i18n-logLead": "logLead",
          "i18n-structure": "structure",
          "i18n-whereTitle": "whereTitle",
          "i18n-whereColWhat": "whereColWhat",
          "i18n-whereColWhere": "whereColWhere",
          "i18n-whereReceiptWhat": "whereReceiptWhat",
          "i18n-whereReceiptWhere": "whereReceiptWhere",
          "i18n-whereLetterWhat": "whereLetterWhat",
          "i18n-whereLetterWhere": "whereLetterWhere",
          "i18n-whereAnchorWhat": "whereAnchorWhat",
          "i18n-whereAnchorWhere": "whereAnchorWhere",
          "i18n-advancedTitle": "advancedTitle",
          "i18n-advancedLead": "advancedLead",
          "i18n-sectionHowToVerify": "sectionHowToVerify",
          "i18n-step1": "step1",
          "i18n-step2": "step2",
          "i18n-step3": "step3",
          "i18n-step4": "step4",
          "i18n-sectionQuickReveal": "sectionQuickReveal",
          "i18n-pasteRevealLine": "pasteRevealLine",
          "i18n-footerNote": "footerNote",
          "i18n-footerSource": "footerSource"
        };
        Object.keys(map).forEach(function(id) {
          var el = document.getElementById(id);
          if (el) el.textContent = T[map[id]] || "";
        });
        var btn = document.getElementById("btnVerify");
        if (btn) btn.textContent = T.btnVerify || "Check reveal hash";

        // Carry the active language into the on-page verifiers so they open
        // in the same language the visitor is reading.
        var verifierLink = document.getElementById("verifierLink");
        if (verifierLink) verifierLink.href = "verify.html?lang=" + lang;
        var letterVerifierLink = document.getElementById("letterVerifierLink");
        if (letterVerifierLink) letterVerifierLink.href = "letter.html?lang=" + lang;

        // Language switcher: mark the active one and persist the choice
        // before navigating so sibling pages stay in the same language.
        var langEn = document.getElementById("langEn");
        var langRu = document.getElementById("langRu");
        if (langEn) langEn.className = lang === "en" ? "active" : "";
        if (langRu) langRu.className = lang === "ru" ? "active" : "";
        function persist(code) {
          return function () { try { localStorage.setItem("bk_verify_lang", code); } catch (e) {} };
        }
        if (langEn) langEn.addEventListener("click", persist("en"));
        if (langRu) langRu.addEventListener("click", persist("ru"));
      })();

      const GAMES = [
        { id: "coinflip38", title: "coinflip38" },
        { id: "karmaladder", title: "karmaladder" },
        { id: "karmapoker", title: "karmapoker" },
        { id: "dice", title: "dice" },
      ];

      function el(tag, attrs = {}, children = []) {
        const n = document.createElement(tag);
        Object.entries(attrs).forEach(([k, v]) => {
          if (k === "class") n.className = v;
          else if (k === "html") n.innerHTML = v;
          else n.setAttribute(k, v);
        });
        children.forEach((c) => n.appendChild(typeof c === "string" ? document.createTextNode(c) : c));
        return n;
      }

      async function fetchJsonl(url) {
        const res = await fetch(url, { cache: "no-store" });
        if (!res.ok) throw new Error(`${url}: HTTP ${res.status}`);
        const txt = await res.text();
        const lines = txt
          .split("\n")
          .map((s) => s.trim())
          .filter(Boolean);
        return lines.map((l) => JSON.parse(l));
      }

      function shortHex(s, n = 10) {
        if (!s || typeof s !== "string") return "-";
        return s.length <= n * 2 + 3 ? s : `${s.slice(0, n)}...${s.slice(-n)}`;
      }

      async function renderGames() {
        const host = document.getElementById("games");
        host.innerHTML = "";

        for (const g of GAMES) {
          const seedsetsUrl = `anchors/${g.id}/seedsets.jsonl`;
          const revealsUrl = `anchors/${g.id}/reveals.jsonl`;

          const card = el("div", { class: "log-card" }, [
            el("div", { class: "log-head" }, [
              el("div", { html: `<b>${g.title}</b>` }),
              el("div", { class: "pill" }, ["anchors"]),
            ]),
            el("div", { class: "files" }, [
              el("a", { href: seedsetsUrl }, ["seedsets.jsonl"]),
              document.createTextNode(" · "),
              el("a", { href: revealsUrl }, ["reveals.jsonl"]),
            ]),
            el("div", { class: "stats" }, [window.__T ? window.__T.loading : "Loading..."]),
          ]);

          host.appendChild(card);

          try {
            const [seedsets, reveals] = await Promise.all([fetchJsonl(seedsetsUrl), fetchJsonl(revealsUrl)]);

            const lastCommit = seedsets[seedsets.length - 1] || null;
            const revealMap = new Map(reveals.map((r) => [r.seedSetId, r]));
            const lastCommitReveal = lastCommit ? revealMap.get(lastCommit.seedSetId) : null;

            const T = window.__T || {};
            const lines = [];
            lines.push(`commits: ${seedsets.length}, reveals: ${reveals.length}`);
            if (lastCommit) {
              lines.push(`latest seedSetId: ${lastCommit.seedSetId}`);
              lines.push(`latest hash: ${shortHex(lastCommit.serverSeedHashHex)}`);
              lines.push(`latest ts: ${lastCommit.ts}`);
              lines.push(`latest seedset: ${lastCommitReveal ? (T.revealedYes || "revealed") : (T.revealedNo || "awaiting reveal")}`);
            } else {
              lines.push(T.noCommits || "No commits yet for this game.");
            }

            card.lastChild.textContent = lines.join("\n");
          } catch (e) {
            const T = window.__T || {};
            card.lastChild.textContent = (T.errorLoading || "Error loading anchors:") + " " + (e && e.message ? e.message : e);
          }
        }
      }

      function hexToBytes(hex) {
        const clean = hex.trim().toLowerCase();
        if (!/^[0-9a-f]*$/.test(clean) || clean.length % 2 !== 0) {
          throw new Error("serverSeedHex must be even-length hex");
        }
        const out = new Uint8Array(clean.length / 2);
        for (let i = 0; i < out.length; i += 1) {
          out[i] = parseInt(clean.slice(i * 2, i * 2 + 2), 16);
        }
        return out;
      }
      function bytesToHex(bytes) {
        return [...bytes].map((b) => b.toString(16).padStart(2, "0")).join("");
      }
      async function sha256HexOfHexBytes(seedHex) {
        const bytes = hexToBytes(seedHex);
        const buf = await crypto.subtle.digest("SHA-256", bytes);
        return bytesToHex(new Uint8Array(buf));
      }

      document.getElementById("btnVerify").addEventListener("click", async () => {
        const out = document.getElementById("verifyOut");
        const T = window.__T || {};
        out.textContent = "";
        try {
          const line = JSON.parse(document.getElementById("revealLine").value);
          const computed = await sha256HexOfHexBytes(line.serverSeedHex);
          const ok = computed.toLowerCase() === String(line.serverSeedHashHex || "").toLowerCase();
          out.textContent =
            `computed sha256(serverSeedHex): ${computed}\n` +
            `anchored serverSeedHashHex:     ${line.serverSeedHashHex}\n` +
            `result: ${ok ? (T.resultOk || "OK") : (T.resultMismatch || "MISMATCH")}`;
          out.className = ok ? "ok" : "bad";
        } catch (e) {
          out.className = "bad";
          out.textContent = (T.errorLabel || "Error:") + " " + (e && e.message ? e.message : e);
        }
      });

      renderGames();
    </script>
  </body>
